name: HospitoFind Lead Generation

on:
  schedule:
    - cron: '0 * * * *'        # every hour at minute 0
  workflow_dispatch:           # allow manual run from Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data and logs directories
        run: mkdir -p data logs

      - name: Write credentials.json from secret
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Create .env file with secrets
        run: |
          echo "REDDIT_CLIENT_ID=${{ secrets.REDDIT_CLIENT_ID }}" >> .env
          echo "REDDIT_CLIENT_SECRET=${{ secrets.REDDIT_CLIENT_SECRET }}" >> .env
          echo "REDDIT_USER_AGENT=${{ secrets.REDDIT_USER_AGENT }}" >> .env
          echo "EMAIL_ADDRESS=${{ secrets.EMAIL_ADDRESS }}" >> .env
          echo "EMAIL_APP_PASSWORD=${{ secrets.EMAIL_APP_PASSWORD }}" >> .env
          echo "SHEET_ID=${{ secrets.SHEET_ID }}" >> .env
          echo "CLIENT_ID=${{ secrets.CLIENT_ID }}" >> .env
          echo "TENANT_ID=${{ secrets.TENANT_ID }}" >> .env
          echo "REFRESH_TOKEN=${{ secrets.REFRESH_TOKEN }}" >> .env

      - name: Run lead generation pipeline
        run: python main.py

              - name: Debug secrets and files
        run: |
          echo "=== .env contents ==="
          cat .env | sed 's/\(.*\)=.*/\1=***/'
          echo ""
          echo "=== credentials.json exists? ==="
          ls -l credentials.json
          echo ""
          echo "=== Sheet ID ==="
          grep SHEET_ID .env | cut -d'=' -f2